name: "Redis-py client testing"

on:
  workflow_dispatch:
    inputs:
      workflow_uuid:
        description: 'Optional UUID to identify this workflow run'
        required: false
      client_test_image:
        description: 'Docker image tag (e.g., unstable-21323211374-debian-amd64)'
        required: false
      redis_version:
        description: 'Redis version (e.g., 8.6.1, unstable)'
        required: false
      repository:
        description: 'Repository to test (e.g., redis/jedis)'
        default: 'redis/redis-py'
        required: false
      ref:
        description: 'Ref to test (e.g., main)'
        default: 'master'
        required: false

# UUID is used to help automation to identify workflow run in the list of workflow runs.
run-name: >-
     Test redis-py client
     ${{ inputs.ref }}
     ${{ github.event.inputs.client_test_image != '' && format('/ {0}', github.event.inputs.client_test_image) || '' }}
     ${{ github.event.inputs.workflow_uuid && format('| {0}', github.event.inputs.workflow_uuid) || '' }}

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_UNSECURE_COMMANDS: true
    name: Redis-py test
    steps:
      - uses: actions/checkout@v6

      - name: Prepare Redis version
        id: prepare_version
        env:
          REDIS_VERSION: ${{ inputs.redis_version }}
        run: |
          # Handle "unstable" version - convert to "8" for testing action
          if [[ "${REDIS_VERSION}" == "unstable" ]]; then
            REDIS_VERSION="8"
            echo "Converted unstable to version 8 for testing action"
          fi

          echo "Final Redis version for tests: ${REDIS_VERSION}"
          echo "redis_version=${REDIS_VERSION}" >> $GITHUB_OUTPUT

      - name: Run tests
        uses: redis/redis-py/.github/actions/run-tests@master
        with:
            python-version: 3.14
            parser-backend: plain
            redis-version: ${{ steps.prepare_version.outputs.redis_version }}
            repository: ${{ inputs.repository }}
            ref: ${{ inputs.ref }}
            client-libs-test-image: ${{ inputs.client_test_image }}

  result:
    name: Create result artifact
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - name: Create result artifact
        env:
          CLIENT_TEST_IMAGE: ${{ inputs.client_test_image }}
          REDIS_VERSION: ${{ inputs.redis_version }}
        shell: bash
        run: |
          cat > result.json << EOF
          {
            "client_test_image_tag": "$CLIENT_TEST_IMAGE",
            "redis_version": "$REDIS_VERSION"
          }
          EOF

          echo "Created result.json:"
          cat result.json

      - name: Upload result artifact
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: result.json
          retention-days: 90